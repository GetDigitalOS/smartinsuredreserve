name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    uses: GetDigitalOS/.github/.github/workflows/deploy-cloudflare-pages.yml@main
    with:
      project-name: "smartinsuredreserve"
      build-command: "npm run build"
      output-directory: ".next"
      package-manager: "npm"
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
